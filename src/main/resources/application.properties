spring.application.name=hello

# datasource (local: create database `management-system`, user/password root)
# MySQL 默认端口 3306；若你的实例监听其他端口，改 URL 中的端口号
spring.datasource.url=jdbc:mysql://localhost:3306/management-system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# mybatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath:mapper/*.xml

# pagehelper (kept for future paging endpoints)
pagehelper.helperDialect=mysql
pagehelper.reasonable=true

# logging (show stack traces/sql in Cursor terminal)
logging.level.root=INFO
logging.level.com.example.hello=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.mybatis=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# object storage (Sealos S3 compatible)
oss.access-key=d3uvbr96
oss.secret-key=vfznwpvsr5c8z9cx
# local dev: use public endpoint (cluster internal URL is unreachable on localhost)
oss.internal-endpoint=https://objectstorageapi.hzh.sealos.run
oss.external-endpoint=https://objectstorageapi.hzh.sealos.run
oss.bucket=d3uvbr96-management-system

# file upload limit
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# jwt
jwt.secret=management-system-super-secret-key-change-me
jwt.expire-millis=7200000
